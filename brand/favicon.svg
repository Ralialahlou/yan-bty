<!--
  Yan BTY favicon — brand guidelines p.46
  Icon form: "y" in a circle, "BTY" below (Tabla Red on white, or reversed)
  Uses the circular icon variant as specified for small applications.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="80" viewBox="0 0 64 80">
  <!-- Circle background: YB Tabla Red #b25745 -->
  <circle cx="32" cy="32" r="32" fill="#b25745"/>
  <!-- "y" glyph in white — Comfortaa Light approximation via path not available,
       using text element (browsers render this correctly for SVG favicons) -->
  <text
    x="32" y="46"
    text-anchor="middle"
    font-family="'Comfortaa', 'Nunito', 'Varela Round', Georgia, serif"
    font-weight="300"
    font-size="38"
    fill="#ffffff"
    letter-spacing="-0.01em"
  >y</text>
  <!-- "BTY" below circle -->
  <text
    x="32" y="74"
    text-anchor="middle"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-weight="200"
    font-size="11"
    fill="#b25745"
    letter-spacing="4"
    dx="2"
  >BTY</text>
</svg>
